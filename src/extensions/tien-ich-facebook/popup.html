<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tiện ích Facebook</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 320px;
      margin: 0;
      padding: 15px;
      background-color: #f0f2f5;
      color: #1c1e21;
    }
    h3 {
      margin-top: 0;
      font-size: 16px;
      text-align: center;
      color: #1877f2;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #606770;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    textarea, input[type="text"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccd0d5;
      border-radius: 6px;
      outline: none;
    }
    textarea {
      height: 80px;
      resize: vertical;
      font-family: monospace;
      font-size: 12px;
      margin-bottom: 12px;
    }
    input[type="text"] {
      font-family: monospace;
      font-size: 13px;
      margin-bottom: 10px;
    }
    textarea:focus, input[type="text"]:focus {
      border-color: #1877f2;
      box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.2);
    }
    .button-group {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background-color: #1877f2;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #166fe5;
    }
    button#btnSet {
      background-color: #42b72a;
    }
    button#btnSet:hover {
      background-color: #36a420;
    }
    .divider {
      border-top: 1px dashed #ccd0d5;
      margin: 15px 0;
    }
    #status {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      font-weight: 500;
    }
    .twofa-result-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .twofa-result-container input {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #1877f2;
      background-color: #e7f3ff;
      border-color: #1877f2;
      margin-bottom: 0;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <h3>Tiện ích Facebook</h3>
  
  <div class="section-title">🔑 Quản lý Cookie</div>
  <textarea id="cookieInput" placeholder="Dán cookie vào đây... (Định dạng: key1=val1; key2=val2; hoặc cookie|token)"></textarea>
  <div class="button-group">
    <button id="btnGet">NHẬN Cookie</button>
    <button id="btnSet">ĐẶT Cookie</button>
  </div>

  <div class="divider"></div>

  <div class="section-title">🛡️ Lấy mã 2FA</div>
  <input type="text" id="twofaKeyInput" placeholder="Nhập khóa bảo mật 2FA (secret key)..." autocomplete="off">
  <button id="btnGet2FA" style="background-color: #8b5cf6;">LẤY MÃ 2FA</button>
  
  <div class="twofa-result-container" id="twofaResultDiv" style="display: none;">
    <input type="text" id="twofaCodeOutput" readonly>
  </div>

  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
