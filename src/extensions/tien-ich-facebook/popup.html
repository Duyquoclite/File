<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tiện ích Facebook</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 340px;
      margin: 0;
      padding: 12px;
      background-color: #f0f2f5;
      color: #1c1e21;
    }
    h3 {
      margin-top: 0;
      font-size: 15px;
      text-align: center;
      color: #1877f2;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #606770;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    textarea, input[type="text"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccd0d5;
      border-radius: 6px;
      outline: none;
    }
    textarea {
      height: 60px;
      resize: vertical;
      font-family: monospace;
      font-size: 11px;
      margin-bottom: 8px;
    }
    input[type="text"] {
      font-family: monospace;
      font-size: 12px;
      margin-bottom: 8px;
    }
    textarea:focus, input[type="text"]:focus {
      border-color: #1877f2;
      box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.2);
    }
    .button-group {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      background-color: #1877f2;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #166fe5;
    }
    button#btnSet {
      background-color: #42b72a;
    }
    button#btnSet:hover {
      background-color: #36a420;
    }
    .divider {
      border-top: 1px dashed #ccd0d5;
      margin: 10px 0;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      font-weight: 500;
    }
    .twofa-result-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .twofa-result-container input {
      flex: 1;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      color: #1877f2;
      background-color: #e7f3ff;
      border-color: #1877f2;
      margin-bottom: 0;
      letter-spacing: 2px;
      padding: 6px;
    }
    .scan-info-container {
      background: white;
      border: 1px solid #ccd0d5;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      margin-bottom: 8px;
      display: none;
    }
    .scan-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .scan-label {
      color: #606770;
    }
    .scan-val {
      font-weight: 600;
      color: #1c1e21;
    }
    .badge {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
    }
    .badge-active { background-color: #e7f3ff; color: #1877f2; }
    .badge-die { background-color: #ffebe9; color: #d93025; }
  </style>
</head>
<body>
  <h3>Tiện ích Facebook</h3>
  
  <!-- Đăng nhập nhanh -->
  <div class="section-title">⚡ Đăng nhập nhanh (UID|Pass|2FA|Cookie)</div>
  <textarea id="quickLoginInput" placeholder="Dán định dạng: UID|Pass|2FA|Cookie... hoặc chỉ Cookie"></textarea>
  <button id="btnQuickLogin" style="background-color: #eab308; margin-bottom: 8px;">ĐĂNG NHẬP NHANH</button>

  <div class="divider"></div>

  <div class="section-title" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
    <span>🔑 Quản lý Cookie</span>
    <select id="cookieFormatSelect" style="font-size: 11px; padding: 2px 6px; border-radius: 4px; border: 1px solid #ccd0d5; background: white; outline: none; cursor: pointer;">
      <option value="raw">RAW</option>
      <option value="json">JSON</option>
    </select>
  </div>
  <textarea id="cookieInput" placeholder="Dán cookie vào đây..."></textarea>
  <div class="button-group">
    <button id="btnGet">NHẬN Cookie</button>
    <button id="btnSet">ĐẶT Cookie</button>
  </div>

  <div class="divider"></div>

  <!-- 2FA -->
  <div class="section-title">🛡️ Lấy mã 2FA</div>
  <input type="text" id="twofaKeyInput" placeholder="Nhập khóa bảo mật 2FA (secret key)..." autocomplete="off">
  <button id="btnGet2FA" style="background-color: #8b5cf6;">LẤY MÃ 2FA</button>
  
  <div class="twofa-result-container" id="twofaResultDiv" style="display: none;">
    <input type="text" id="twofaCodeOutput" readonly>
  </div>

  <button id="btnClearCookies" style="background-color: #ef4444; margin-top: 4px;">XÓA COOKIE FACEBOOK</button>

  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
