<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cookie Get/Set Tool</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 320px;
      margin: 0;
      padding: 15px;
      background-color: #f0f2f5;
      color: #1c1e21;
    }
    h3 {
      margin-top: 0;
      font-size: 16px;
      text-align: center;
      color: #1877f2;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    textarea {
      width: 100%;
      height: 120px;
      resize: vertical;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccd0d5;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      margin-bottom: 15px;
      outline: none;
    }
    textarea:focus {
      border-color: #1877f2;
      box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.2);
    }
    .button-group {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background-color: #1877f2;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #166fe5;
    }
    button#btnSet {
      background-color: #42b72a;
    }
    button#btnSet:hover {
      background-color: #36a420;
    }
    #status {
      margin-top: 15px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h3>Cookie Get/Set Tool</h3>
  <textarea id="cookieInput" placeholder="Dán cookie vào đây... (Định dạng: key1=val1; key2=val2; | token)"></textarea>
  <div class="button-group">
    <button id="btnGet">NHẬN Cookie</button>
    <button id="btnSet">ĐẶT Cookie</button>
  </div>
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
