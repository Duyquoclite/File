  <!-- ====== Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="confirmModalTitle">Xác nhận</h2>
        <button class="btn-close" id="confirmModalClose">✕</button>
      </div>
      <div class="modal-body">
        <p id="confirmModalMessage">Bạn có chắc chắn không?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmModalCancel">Hủy</button>
        <button class="btn btn-danger" id="confirmModalConfirm">Xác nhận</button>
      </div>
    </div>
  </div>
